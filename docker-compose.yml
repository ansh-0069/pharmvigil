version: "3.9"

services:
  # ── PostgreSQL ────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: pharma_postgres
    environment:
      POSTGRES_DB: pharmacovigilance
      POSTGRES_USER: pharma_user
      POSTGRES_PASSWORD: pharma_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pharma_user -d pharmacovigilance"]
      interval: 10s
      retries: 5

  # ── FastAPI Backend ───────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pharma_api
    command: uvicorn src.api.app:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: pharmacovigilance
      DB_USER: pharma_user
      DB_PASSWORD: pharma_pass
    depends_on:
      postgres:
        condition: service_healthy

  # ── Streamlit Dashboard ───────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pharma_dashboard
    command: streamlit run dashboard/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    environment:
      API_URL: http://api:8000
    depends_on:
      - api

  # ── Airflow Webserver ─────────────────────────────
  airflow-webserver:
    image: apache/airflow:2.8.1-python3.11
    container_name: pharma_airflow_webserver
    command: >
      bash -c "airflow db init &&
               airflow users create --username admin --password admin
                 --firstname Admin --lastname User --role Admin --email admin@example.com &&
               airflow webserver --port 8080"
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://pharma_user:pharma_pass@postgres:5432/pharmacovigilance
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
    volumes:
      - ./src/pipelines:/opt/airflow/dags
    depends_on:
      postgres:
        condition: service_healthy

  # ── Airflow Scheduler ─────────────────────────────
  airflow-scheduler:
    image: apache/airflow:2.8.1-python3.11
    container_name: pharma_airflow_scheduler
    command: airflow scheduler
    environment:
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://pharma_user:pharma_pass@postgres:5432/pharmacovigilance
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
    volumes:
      - ./src/pipelines:/opt/airflow/dags
    depends_on:
      - airflow-webserver

volumes:
  pgdata:
