# PharmVigil ops dashboard — aligns with custom CSS in dashboard/streamlit_app.py.
# Streamlit applies these before runtime CSS; keep hex values in sync with APP_CSS :root.

[theme]
base = "dark"
primaryColor = "#38bdf8"
backgroundColor = "#0b111b"
secondaryBackgroundColor = "#121a28"
textColor = "#e2e8f0"
font = "sans serif"

[client]
# Sidebar is hidden via CSS; native sidebar nav is unused.
showSidebarNavigation = false
